{% extends "base.html" %}

{% block title %}News & Technology{% endblock %}

{% block content %}
<section class="py-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16">
            <h1 class="text-4xl font-bold">News & Technology</h1>
            <p class="mt-4 text-gray-400 max-w-2xl mx-auto">
                Latest updates and trends in industrial automation industry
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            {% for item in news %}
            <article class="glass rounded-xl overflow-hidden hover:translate-y-[-4px] transition-transform">
                <div class="h-48 bg-gradient-to-br from-{{ item.gradient_from }}/20 to-{{ item.gradient_to }}/20 flex items-center justify-center">
                    <i class="fa {{ item.icon }} text-5xl text-{{ item.gradient_from }}/50"></i>
                </div>
                <div class="p-6">
                    <span class="text-xs text-tech font-semibold">{{ item.date }}</span>
                    <h3 class="text-xl font-bold mt-2">{{ item.title }}</h3>
                    <p class="text-gray-400 mt-3">{{ item.excerpt }}</p>
                    <a href="#" class="mt-4 inline-block text-accent hover:underline">Read more →</a>
                </div>
            </article>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
